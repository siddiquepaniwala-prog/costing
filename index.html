<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotton Costing Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{margin:0;font-family:'Poppins';background:#f5f5f5;padding:15px;}
.container{max-width:420px;margin:auto;}
.title{font-size:26px;font-weight:600;}
.sub{color:#ff7a00;font-size:13px;font-weight:600;}
.desc{font-size:13px;color:#777;margin-bottom:15px;}

.card{background:#fff;border-radius:18px;padding:15px;margin-bottom:15px;box-shadow:0 5px 20px rgba(0,0,0,0.05);}
.card-title{font-weight:600;font-size:14px;margin-bottom:10px;}
.row{display:flex;gap:10px;margin-bottom:10px;}
.group{flex:1;}
label{font-size:11px;color:#777;}
input{width:100%;padding:12px;border-radius:12px;border:1px solid #e5e5e5;margin-top:5px;font-size:16px;background:#fafafa;}

.btn{width:100%;padding:14px;border:none;border-radius:14px;background:#ff7a00;color:#fff;font-size:16px;font-weight:600;margin-top:10px;}
.share{width:100%;padding:14px;border:none;border-radius:14px;background:#1f2b3a;color:#fff;font-size:16px;margin-top:10px;}

.result{background:#1f2b3a;color:#fff;border-radius:16px;padding:15px;display:flex;justify-content:space-between;margin-top:10px;}
.result h4{font-size:12px;color:#aaa;}
.value{font-size:22px;font-weight:600;}
.green{color:#00d084;}
</style>
</head>

<body>

<div class="container" id="report">

<div class="title">Cotton Costing Pro</div>
<div class="sub">BY SIDDIQUE PANIWALA</div>
<div class="desc">Textile cost & profit calculator</div>

<div class="card">
<div class="card-title">YARN DETAILS</div>
<div class="row">
<input id="taar" placeholder="Taar">
<input id="length" placeholder="T.L">
</div>
<div class="row">
<input id="pick" placeholder="Pick">
<input id="width" placeholder="Rundi">
</div>
</div>

<div class="card">
<div class="card-title">COUNTS</div>
<div class="row">
<input id="weftCount" placeholder="Weft Count">
<input id="warpCount" placeholder="Warp Count">
</div>
</div>

<div class="card">
<div class="card-title">RATES</div>
<div class="row">
<input id="weftRate" placeholder="Weft Rate">
<input id="warpRate" placeholder="Warp Rate">
</div>
<input id="saleRate" placeholder="Sale Rate">
</div>

<div class="card">
<div class="card-title">COSTS</div>
<div class="row">
<input id="labour" placeholder="Labour">
<input id="sizing" placeholder="Sizing">
</div>
<input id="meter" placeholder="Takha Meter">
</div>

<button class="btn" onclick="calc()">Calculate</button>
<button class="share" onclick="shareData()">Share Result</button>

<div class="result">
<div>
<h4>COST / METER</h4>
<div id="cost" class="value">0</div>
</div>
<div>
<h4>PROFIT</h4>
<div id="profit" class="value green">0</div>
</div>
</div>

</div>

<script>

function v(id){return parseFloat(document.getElementById(id).value)||0;}

function calc(){
let weftTakha=(v("pick")*v("width")*v("length"))/1850/v("weftCount");
let warpTakha=(v("taar")*v("length"))/1850/v("warpCount");

let cost=((weftTakha*v("weftRate")/5)+(warpTakha*v("warpRate")/5)+v("labour")+(warpTakha*v("sizing")))/v("meter");
let profit=(v("saleRate")+(v("saleRate")*0.05))-cost;

document.getElementById("cost").innerText=cost.toFixed(2);
document.getElementById("profit").innerText=profit.toFixed(2);
}

// SHARE FUNCTION
function shareData(){

let text = `
Cotton Costing Report

Cost/Meter: ${document.getElementById("cost").innerText}
Profit: ${document.getElementById("profit").innerText}
Sale Rate: ${v("saleRate")}

Taar: ${v("taar")}
Pick: ${v("pick")}
Width: ${v("width")}
`;


// WhatsApp
window.open("https://wa.me/?text="+encodeURIComponent(text));

// SMS fallback
window.location.href = "sms:?body="+encodeURIComponent(text);

// PDF
html2pdf().from(document.getElementById("report")).save("Costing_Report.pdf");

}

</script>

</body>
</html>
